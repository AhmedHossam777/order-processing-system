version: '3.8'

services:
  # ═══════════════════════════════════════
  # MESSAGE BROKER
  # ═══════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-microservices
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════
  # DATABASES — One per service!
  # ═══════════════════════════════════════
  orders-db:
    image: postgres:16-alpine
    container_name: orders-db
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_pass
    volumes:
      - orders_db_data:/var/lib/postgresql/data

  payments-db:
    image: postgres:16-alpine
    container_name: payments-db
    ports:
      - '5434:5432'
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: payments_user
      POSTGRES_PASSWORD: payments_pass
    volumes:
      - payments_db_data:/var/lib/postgresql/data

  notifications-db:
    image: postgres:16-alpine
    container_name: notifications-db
    ports:
      - '5435:5432'
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: notifications_user
      POSTGRES_PASSWORD: notifications_pass
    volumes:
      - notifications_db_data:/var/lib/postgresql/data

  inventory-db:
    image: postgres:16-alpine
    container_name: inventory-db
    ports:
      - '5436:5432'
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
    volumes:
      - inventory_db_data:/var/lib/postgresql/data

volumes:
  rabbitmq_data:
  orders_db_data:
  payments_db_data:
  notifications_db_data:
  inventory_db_data: